<!DOCTYPE html>
<html lang="ja" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalBird🐣</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        :root {
            --pico-block-spacing-vertical: 4pt !important;
            --pico-block-spacing-horizontal: 4pt !important;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1pt;
        }

        .card {
            margin-bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            /* 比率を保ちつつ枠を埋める */
            border-radius: 4pt;
            cursor: pointer;
            background-color: #333;
            /* 読み込み前のプレースホルダ色 */
        }

        .card footer {
            font-size: 0.8rem;
        }

        #pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }
    </style>
</head>

<body>
    <main>
        <section class="upload-section container">
            <details>
                <summary role="button" class="outline">XPostInfoファイルをアップロード</summary>
                <form id="uploadForm">
                    <input type="file" id="jsonFile" accept=".json" required multiple>
                    <button type="submit" id="uploadBtn">インポート開始</button>
                    <progress id="uploadProgress" style="display:none;"></progress>
                </form>
            </details>
        </section>
        <div id="gallery" class="gallery-grid">
            {% for post in posts %}
            {% for idx in post.images %}
            <article class="card" id="card-{{ post.postid }}-{{ idx }}" data-postid="{{ post.postid }}" ,
                data-idx="{{ idx }}" data-username="{{ post.username }}" data-textcontent="{{ post.textcontent }}"
                data-timestamp="{{ post.timestamp }}" onclick="openModalFromElement(this)">
                <img src="/image/thumbnail/{{ post.postid }}/{{ idx }}" loading="lazy">
            </article>
            {% endfor %}
            {% endfor %}
        </div>
    </main>

    <dialog id="detail-modal">
        <article>
            <header>
                <button onclick="closeModal()">閉じる</button>
                <p id="modal-username"></p>
                <p id="modal-text"></p>
                <small id="modal-timestamp"></small>
            </header>
            <div>
                <a id="modal-anchor" style="width: 100%;">
                    <img id="modal-img" style="width: 100%;">
                </a>
            </div>
            <footer>
                <button id="modal-delete">削除</button>
            </footer>
        </article>
    </dialog>

    <footer id="pagination">
        {% if page > 1 %}
        <a href="/?page={{ page - 1 }}"><button>←</button></a>
        {% endif %}
        <span> {{ page }} </span>
        {% if posts %}
        <a class="button" href="/?page={{ page + 1 }}"><button>→</button></a>
        {% endif %}
    </footer>

    <script>
        const uploadForm = document.getElementById('uploadForm');

        const postXPostInfo = async (file) => {
            console.log("Posting", file)
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch('/post-xpostinfo', {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                if (res.ok) {
                    // 何もしない
                } else {
                    alert('エラー: ' + result.error);
                }
            } catch (err) {
                alert('通信エラーが発生しました');
            }
        }

        // アップロード処理
        uploadForm.onsubmit = async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('jsonFile');
            const btn = document.getElementById('uploadBtn');
            const progress = document.getElementById('uploadProgress');

            if (!fileInput.files[0]) return;

            btn.disabled = true;
            progress.style.display = 'block';

            try {
                for (const file of fileInput.files) {
                    await postXPostInfo(file)
                }
                // すべてのアップロードが完了したら再読み込み
                window.location.reload();
            } catch (err) {
                alert(err)
            } finally {
                btn.disabled = false;
                progress.style.display = 'none';
                uploadForm.reset();
            }
            uploadForm.reset();

        };

        // モーダルダイアログ管理
        const modal = document.getElementById("detail-modal");

        function openModalFromElement(element) {
            const d = element.dataset;
            document.getElementById("modal-username").innerText = d.username;
            document.getElementById("modal-text").innerText = d.textcontent;
            document.getElementById("modal-timestamp").innerText = d.timestamp;

            const fullPath = `/image/full/${d.postid}/${d.idx}`;
            document.getElementById("modal-img").src = fullPath;
            document.getElementById("modal-anchor").href = fullPath;

            const deleteButton = document.getElementById("modal-delete");
            deleteButton.onclick = async () => {
                if (!confirm("削除しますか？")) {
                    return;
                }
                try {
                    const response = await fetch(`/delete/${d.postid}`, { method: "POST" })
                    if (response.ok) {
                        window.location.reload();
                    } else {
                        alert("削除に失敗しました：" + (await response.json()))
                    }
                } catch (error) {
                    alert("通信エラーが発生しました：", new String(error));
                }
            }

            modal.setAttribute("open", "true");
        }

        function closeModal() {
            modal.removeAttribute("open");
        }
    </script>
</body>

</html>
